[project]
name = "apm"
description = "Git-native, agent-first project management tool"

[tickets]
dir = "tickets"

[worktrees]
dir = "../apm--worktrees"

[[repos.code]]
path = "philippepascal/apm"
default_branch = "main"

[provider]
type = "github"
token_env = "APM_GITHUB_TOKEN"
poll_interval_secs = 60
webhook_secret_env = "APM_WEBHOOK_SECRET"

[workflow]
terminal_states = ["closed"]

[[workflow.states]]
id         = "new"
label      = "New"
color      = "#6b7280"
layer      = 1
actionable = ["agent"]

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"
  actor         = "agent"
  preconditions = ["spec_not_empty", "spec_has_acceptance_criteria"]

  [[workflow.states.transitions]]
  to      = "question"
  trigger = "manual"
  actor   = "agent"

[[workflow.states]]
id         = "question"
label      = "Question"
color      = "#f59e0b"
layer      = 1
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to      = "new"
  trigger = "manual"
  actor   = "any"

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"
  actor         = "agent"
  preconditions = ["spec_not_empty", "spec_has_acceptance_criteria"]

[[workflow.states]]
id         = "specd"
label      = "Specd"
color      = "#3b82f6"
layer      = 1
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to      = "ready"
  trigger = "manual"
  actor   = "supervisor"

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id         = "ammend"
label      = "Ammend"
color      = "#ef4444"
layer      = 1
actionable = ["agent"]

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"
  actor         = "agent"
  preconditions = ["spec_not_empty", "spec_has_acceptance_criteria"]

  [[workflow.states.transitions]]
  to      = "question"
  trigger = "manual"
  actor   = "agent"

[[workflow.states]]
id         = "ready"
label      = "Ready"
color      = "#10b981"
layer      = 1
actionable = ["agent"]

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "command:start"
  actor   = "agent"

[[workflow.states]]
id    = "in_progress"
label = "In Progress"
color = "#8b5cf6"
layer = 2

  [[workflow.states.transitions]]
  to            = "implemented"
  trigger       = "manual"
  actor         = "agent"
  preconditions = ["pr_exists"]

  [[workflow.states.transitions]]
  to           = "ready"
  trigger      = "manual"
  actor        = "any"
  side_effects = ["set_agent_null", "set_branch_null"]

[[workflow.states]]
id         = "implemented"
label      = "Implemented"
color      = "#06b6d4"
layer      = 2
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to            = "accepted"
  trigger       = "manual"
  actor         = "engineer"
  preconditions = ["pr_all_closing_merged"]

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "manual"
  actor   = "any"

[[workflow.states]]
id         = "accepted"
label      = "Accepted"
color      = "#84cc16"
layer      = 2
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id       = "closed"
label    = "Closed"
color    = "#374151"
layer    = 1
terminal = true

# Auto-transitions: fired by apm sync or git hooks — no daemon required.

[[workflow.auto_transitions]]
on                = "event:branch_push_first"
from              = "ready"
to                = "in_progress"
requires_provider = false   # fires from local pre-push hook

[[workflow.auto_transitions]]
on                = "event:pr_opened"
from              = "in_progress"
to                = "implemented"
requires_provider = true

[[workflow.auto_transitions]]
on                = "event:pr_all_merged"
from              = "implemented"
to                = "accepted"
requires_provider = false   # detected via git branch --merged

[workflow.prioritization]
priority_weight = 10.0
effort_weight   = -2.0
risk_weight     = -1.0

[agents]
instructions   = "apm.agents.md"
max_concurrent = 3
