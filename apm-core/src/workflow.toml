[workflow]

[[workflow.states]]
id    = "new"
label = "New"

  [[workflow.states.transitions]]
  to      = "groomed"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id           = "groomed"
label        = "Groomed"
actionable   = ["agent"]
dep_requires = "spec"
instructions = ".apm/apm.spec-writer.md"

  [[workflow.states.transitions]]
  to              = "in_design"
  trigger         = "command:start"
  profile         = "spec_agent"
  context_section = "Problem"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id         = "question"
label      = "Question"
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to      = "groomed"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id             = "specd"
label          = "Specd"
actionable     = ["supervisor"]
satisfies_deps = "spec"
worker_end     = true

  [[workflow.states.transitions]]
  to           = "ready"
  trigger      = "manual"

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id             = "ammend"
label          = "Ammend"
actionable     = ["agent"]
dep_requires   = "spec"
satisfies_deps = "spec"
instructions   = ".apm/apm.spec-writer.md"

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"

  [[workflow.states.transitions]]
  to      = "question"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "in_design"
  trigger = "command:start"
  profile = "spec_agent"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id           = "in_design"
label        = "In Design"
instructions = ".apm/apm.spec-writer.md"

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"

  [[workflow.states.transitions]]
  to      = "question"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id             = "ready"
label          = "Ready"
actionable     = ["agent"]
satisfies_deps = "spec"
instructions   = ".apm/apm.worker.md"

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "command:start"
  profile = "impl_agent"

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "specd"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id             = "in_progress"
label          = "In Progress"
satisfies_deps = "spec"
instructions   = ".apm/apm.worker.md"

  [[workflow.states.transitions]]
  to         = "implemented"
  trigger    = "manual"
  completion = "merge"

  [[workflow.states.transitions]]
  to      = "blocked"
  trigger = "manual"
  label   = "Agent is blocked — wrote questions in ### Open questions"

  [[workflow.states.transitions]]
  to           = "ready"
  trigger      = "manual"
  warning      = "Reverting in_progress ticket to ready — any uncommitted work on the branch may be lost"

  [[workflow.states.transitions]]
  to           = "ammend"
  trigger      = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id         = "blocked"
label      = "Blocked"
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to           = "ready"
  trigger      = "manual"
  label        = "Supervisor answered questions — agent can resume"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id             = "implemented"
label          = "Implemented"
actionable     = ["supervisor"]
satisfies_deps = true
worker_end     = true

  [[workflow.states.transitions]]
  to            = "ready"
  trigger       = "manual"
  focus_section = "Code review"

  [[workflow.states.transitions]]
  to           = "ammend"
  trigger      = "manual"

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "manual"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"

[[workflow.states]]
id             = "closed"
label          = "Closed"
terminal       = true
satisfies_deps = true

[workflow.prioritization]
priority_weight = 10.0
effort_weight   = -2.0
risk_weight     = -1.0
