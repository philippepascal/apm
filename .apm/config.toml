[project]
name = "apm"
description = "Git-native, agent-first project management tool"

[tickets]
dir = "tickets"
archive_dir = "archive/tickets"

[worktrees]
dir = "../apm--worktrees"
agent_dirs = [".claude", ".cursor", ".windsurf"]

[[repos.code]]
path = "philippepascal/apm"
default_branch = "main"

[git_host]
provider = "github"
repo = "philippepascal/apm"
token_env = "APM_GITHUB_TOKEN"

[agents]
instructions   = ".apm/agents.md"
max_concurrent = 1

[sync]
aggressive = true

[logging]
enabled = true
file = "/tmp/apm.log"

[workers]
  command = "claude"
  args = ["--print"]
  model = "sonnet"

[worker_profiles.spec_agent]
instructions = ".apm/apm.spec-writer.md"
role_prefix = "You are a Spec-Writer agent assigned to ticket #<id>."

[worker_profiles.impl_agent]
instructions = ".apm/apm.worker.md"
role_prefix = "You are a Worker agent assigned to ticket #<id>."