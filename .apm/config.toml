[project]
name = "apm"
description = "Git-native, agent-first project management tool"
default_branch = "main"
collaborators = []

[tickets]
dir = "tickets"
archive_dir = "archive/tickets"

[worktrees]
dir = ".apm--worktrees"
agent_dirs = [".claude", ".cursor", ".windsurf"]

[git_host]
provider = "github"
repo = "philippepascal/apm"
token_env = "APM_GITHUB_TOKEN"

[agents]
project               = ".apm/project.md"
max_concurrent        = 4
max_workers_per_epic  = 1
max_workers_on_default = 1

[sync]
aggressive = true

[logging]
enabled = true
file = "/tmp/apm.log"

[workers]
default = "claude/worker"
model = "sonnet"
