[project]
name = "apm"
description = "Git-native, agent-first project management tool"

[tickets]
dir = "tickets"
archive_dir = "archive/tickets"

[worktrees]
dir = ".apm--worktrees"
agent_dirs = [".claude", ".cursor", ".windsurf"]

[git_host]
provider = "github"
repo = "philippepascal/apm"
token_env = "APM_GITHUB_TOKEN"

[agents]
instructions          = ".apm/agents/default/agents.md"
max_concurrent        = 4
max_workers_per_epic  = 1
max_workers_on_default = 1

[sync]
aggressive = true

[logging]
enabled = true
file = "/tmp/apm.log"

[workers]
  command = "claude"
  args = ["--print"]
  model = "sonnet"

[worker_profiles.phi4]
agent = "phi4"

[worker_profiles.phi4.options]
model = "phi4"

[worker_profiles.pi-phi4]
agent = "pi"

[worker_profiles.pi-phi4.options]
model = "phi4"
