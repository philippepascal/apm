[project]
name = "apm"
description = "Git-native, agent-first project management tool"

[tickets]
dir = "tickets"
archive_dir = "archive/tickets"

[worktrees]
dir = "../apm--worktrees"

[[repos.code]]
path = "philippepascal/apm"
default_branch = "main"

[git_host]
provider = "github"
repo = "philippepascal/apm"
token_env = "APM_GITHUB_TOKEN"

[agents]
instructions   = ".apm/agents.md"
max_concurrent = 1

[sync]
aggressive = true

[logging]
enabled = true
file = "/tmp/apm.log"

[workers]
  command = "claude"
  args = ["--print"]
  model = "sonnet"