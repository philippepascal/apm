[project]
name = "apm"
description = "Git-native, agent-first project management tool"

[tickets]
dir = "tickets"

[worktrees]
dir = "../apm--worktrees"

[[repos.code]]
path = "philippepascal/apm"
default_branch = "main"

[provider]
type = "github"
token_env = "APM_GITHUB_TOKEN"
poll_interval_secs = 60
webhook_secret_env = "APM_WEBHOOK_SECRET"

[agents]
instructions   = ".apm/agents.md"
max_concurrent = 1

[sync]
aggressive = true

[logging]
enabled = true
file = "/tmp/apm.log"

[workers]
  command = "claude"
  args = ["--print"]
  model = "sonnet"