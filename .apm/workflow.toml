[workflow]
terminal_states = ["closed"]

[[workflow.states]]
id    = "new"
label = "New"
color = "#6b7280"
layer = 1

  [[workflow.states.transitions]]
  to      = "groomed"
  trigger = "manual"
  actor   = "supervisor"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id           = "groomed"
label        = "Groomed"
color        = "#6366f1"
layer        = 1
actionable   = ["agent"]
dep_requires = "spec"
instructions = ".apm/apm.spec-writer.md"

  [[workflow.states.transitions]]
  to      = "in_design"
  trigger = "command:start"
  actor   = "agent"
  context_section = "Problem"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id         = "question"
label      = "Question"
color      = "#f59e0b"
layer      = 1
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to      = "groomed"
  trigger = "manual"
  actor   = "any"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id             = "specd"
label          = "Specd"
color          = "#3b82f6"
layer          = 1
actionable     = ["supervisor"]
satisfies_deps = "spec"

  [[workflow.states.transitions]]
  to           = "ready"
  trigger      = "manual"
  actor        = "supervisor"
  side_effects = ["set_agent_null"]

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"
  actor   = "supervisor"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id             = "ammend"
label          = "Ammend"
color          = "#ef4444"
layer          = 1
actionable     = ["agent"]
dep_requires   = "spec"
satisfies_deps = "spec"
instructions   = ".apm/apm.spec-writer.md"

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"
  actor         = "agent"
  preconditions = ["spec_not_empty", "spec_has_acceptance_criteria"]

  [[workflow.states.transitions]]
  to      = "question"
  trigger = "manual"
  actor   = "agent"

  [[workflow.states.transitions]]
  to      = "in_design"
  trigger = "command:start"
  actor   = "agent"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id           = "in_design"
label        = "In Design"
color        = "#f97316"
layer        = 1
instructions = ".apm/apm.spec-writer.md"

  [[workflow.states.transitions]]
  to            = "specd"
  trigger       = "manual"
  actor         = "agent"
  preconditions = ["spec_not_empty", "spec_has_acceptance_criteria"]

  [[workflow.states.transitions]]
  to      = "question"
  trigger = "manual"
  actor   = "agent"

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"
  actor   = "supervisor"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id             = "ready"
label          = "Ready"
color          = "#10b981"
layer          = 1
actionable     = ["agent"]
satisfies_deps = "spec"
instructions   = ".apm/apm.worker.md"

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "command:start"
  actor   = "agent"

  [[workflow.states.transitions]]
  to      = "ammend"
  trigger = "manual"
  actor   = "supervisor"

  [[workflow.states.transitions]]
  to      = "specd"
  trigger = "manual"
  actor   = "supervisor"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id             = "in_progress"
label          = "In Progress"
color          = "#8b5cf6"
layer          = 2
satisfies_deps = "spec"
instructions   = ".apm/apm.worker.md"

  [[workflow.states.transitions]]
  to         = "implemented"
  trigger    = "manual"
  actor      = "agent"
  completion = "pr_or_epic_merge"

  [[workflow.states.transitions]]
  to      = "blocked"
  trigger = "manual"
  actor   = "agent"
  label   = "Agent is blocked — wrote questions in ### Open questions"

  [[workflow.states.transitions]]
  to           = "ammend"
  trigger      = "manual"
  actor        = "supervisor"
  side_effects = ["set_agent_null"]

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id         = "blocked"
label      = "Blocked"
color      = "#dc2626"
layer      = 2
actionable = ["supervisor"]

  [[workflow.states.transitions]]
  to           = "ready"
  trigger      = "manual"
  actor        = "supervisor"
  label        = "Supervisor answered questions — agent can resume"
  side_effects = ["set_agent_null"]

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id             = "implemented"
label          = "Implemented"
color          = "#06b6d4"
layer          = 2
actionable     = ["supervisor"]
satisfies_deps = true

  [[workflow.states.transitions]]
  to             = "ready"
  trigger        = "manual"
  actor          = "supervisor"
  side_effects   = ["set_agent_null"]
  focus_section  = "Code review"

  [[workflow.states.transitions]]
  to           = "ammend"
  trigger      = "manual"
  actor        = "supervisor"
  side_effects = ["set_agent_null"]

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "manual"
  actor   = "any"

  [[workflow.states.transitions]]
  to      = "closed"
  trigger = "manual"
  actor   = "supervisor"

[[workflow.states]]
id             = "closed"
label          = "Closed"
color          = "#374151"
layer          = 1
terminal       = true
satisfies_deps = true


[workflow.prioritization]
priority_weight = 10.0
effort_weight   = -2.0
risk_weight     = -1.0
