[workflow]

[[workflow.states]]
id    = "new"
label = "New"

  [[workflow.states.transitions]]
  to      = "groomed"
  trigger = "manual"
  outcome = "needs_input"

[[workflow.states]]
id           = "groomed"
label        = "Groomed"
dep_requires = "spec"

  [[workflow.states.transitions]]
  to              = "in_design"
  trigger         = "command:start"
  context_section = "Problem"
  outcome         = "needs_input"

[[workflow.states]]
id    = "question"
label = "Question"

  [[workflow.states.transitions]]
  to      = "amend"
  trigger = "manual"
  outcome = "needs_input"

[[workflow.states]]
id             = "specd"
label          = "Specd"
satisfies_deps = "spec"
worker_end     = true

  [[workflow.states.transitions]]
  to      = "ready"
  trigger = "manual"
  outcome = "needs_input"

  [[workflow.states.transitions]]
  to      = "amend"
  trigger = "manual"
  outcome = "needs_input"

[[workflow.states]]
id             = "amend"
label          = "Amend"
dep_requires   = "spec"
satisfies_deps = "spec"

  [[workflow.states.transitions]]
  to      = "in_design"
  trigger = "command:start"
  outcome = "needs_input"

[[workflow.states]]
id             = "in_design"
label          = "In Design"
worker_profile = "claude/spec-writer"

  [[workflow.states.transitions]]
  to          = "specd"
  trigger     = "manual"
  outcome     = "success"
  worker_hint = "If you finished writing or revising the spec"

  [[workflow.states.transitions]]
  to          = "question"
  trigger     = "manual"
  outcome     = "needs_input"
  worker_hint = "If you cannot proceed during design without more info"
  worker_pre  = "apm spec <id> --section 'Open questions' --append '<your question text>'"

[[workflow.states]]
id             = "ready"
label          = "Ready"
satisfies_deps = "spec"

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "command:start"
  outcome = "needs_input"

  [[workflow.states.transitions]]
  to      = "specd"
  trigger = "manual"
  outcome = "needs_input"

[[workflow.states]]
id             = "in_progress"
label          = "In Progress"
satisfies_deps = "spec"
worker_profile = "claude/coder"

  [[workflow.states.transitions]]
  to          = "implemented"
  trigger     = "manual"
  completion  = "merge"
#  completion = "pr_or_epic_merge"
  on_failure  = "merge_failed"
  outcome     = "success"
  worker_hint = "If you completed the implementation and tests pass"

  [[workflow.states.transitions]]
  to          = "blocked"
  trigger     = "manual"
  label       = "Agent is blocked — wrote questions in ### Open questions"
  outcome     = "needs_input"
  worker_hint = "If you lack information to proceed (write your question first)"
  worker_pre  = "apm spec <id> --section 'Open questions' --append '<your question text>'"

  [[workflow.states.transitions]]
  to      = "ready"
  trigger = "manual"
  warning = "Reverting in_progress ticket to ready — any uncommitted work on the branch may be lost"
  outcome = "needs_input"

[[workflow.states]]
id    = "blocked"
label = "Blocked"

  [[workflow.states.transitions]]
  to      = "ready"
  trigger = "manual"
  label   = "Supervisor answered questions — agent can resume"
  outcome = "needs_input"

[[workflow.states]]
id             = "implemented"
label          = "Implemented"
satisfies_deps = true
worker_end     = true

  [[workflow.states.transitions]]
  to            = "fix"
  trigger       = "manual"
  focus_section = "Code review"
  outcome       = "needs_input"

[[workflow.states]]
id             = "fix"
label          = "Fix Implementation"
satisfies_deps = "spec"

  [[workflow.states.transitions]]
  to      = "in_progress"
  trigger = "command:start"
  outcome = "needs_input"

  [[workflow.states.transitions]]
  to      = "implemented"
  trigger = "manual"
  outcome = "needs_input"

[[workflow.states]]
id    = "merge_failed"
label = "Merge failed"

  [[workflow.states.transitions]]
  to         = "implemented"
  trigger    = "manual"
  completion = "merge"
#  completion = "pr_or_epic_merge"
  on_failure = "merge_failed"
  outcome    = "needs_input"

[[workflow.states]]
id             = "closed"
label          = "Closed"

terminal       = true
satisfies_deps = true


[workflow.prioritization]
priority_weight = 10.0
effort_weight   = -2.0
risk_weight     = -1.0
