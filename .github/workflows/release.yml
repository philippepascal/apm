name: Release

# Linux musl build only. macOS aarch64 is built locally by scripts/release.sh
# and uploaded to the GitHub Release before this workflow runs. The release
# itself is created by scripts/release.sh; softprops/action-gh-release below
# is idempotent (create-or-update), so the Linux tarball is appended.
#
# Tests are run locally by scripts/release.sh before the tag is created;
# this workflow does not re-run them.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-x86_64-unknown-linux-musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build apm-ui assets
        working-directory: apm-ui
        run: |
          npm ci
          npm run build

      - name: Add Rust target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get install -y musl-tools

      - name: Build binaries
        run: cargo build --release --target x86_64-unknown-linux-musl -p apm-cli -p apm-server

      - name: Strip binaries
        run: |
          strip target/x86_64-unknown-linux-musl/release/apm
          strip target/x86_64-unknown-linux-musl/release/apm-server

      - name: Package archive
        run: |
          tar -czf apm-${GITHUB_REF_NAME}-x86_64-unknown-linux-musl.tar.gz \
            -C target/x86_64-unknown-linux-musl/release apm apm-server

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apm-${{ github.ref_name }}-x86_64-unknown-linux-musl.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
