name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build apm-ui assets
        working-directory: apm-ui
        run: |
          npm install --no-package-lock
          npm run build

      - name: Run tests
        run: cargo test --workspace

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            use_zigbuild: false
            musl: false
          - os: macos-13
            target: x86_64-apple-darwin
            use_zigbuild: false
            musl: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            use_zigbuild: false
            musl: true
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            use_zigbuild: true
            musl: true

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build apm-ui assets
        working-directory: apm-ui
        run: |
          npm install --no-package-lock
          npm run build

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Set up Zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v1

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        run: cargo install cargo-zigbuild

      - name: Build binaries (standard)
        if: '!matrix.use_zigbuild'
        run: cargo build --release --target ${{ matrix.target }} -p apm -p apm-server

      - name: Build binaries (zigbuild)
        if: matrix.use_zigbuild
        run: cargo zigbuild --release --target ${{ matrix.target }} -p apm -p apm-server

      - name: Strip binaries
        run: |
          strip target/${{ matrix.target }}/release/apm
          strip target/${{ matrix.target }}/release/apm-server

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Package archive
        run: |
          tar -czf apm-${{ steps.tag.outputs.name }}-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release apm apm-server

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apm-${{ steps.tag.outputs.name }}-${{ matrix.target }}
          path: apm-${{ steps.tag.outputs.name }}-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
