name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
    runs-on: ubuntu-22.04
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: '.github/cla-signatures.json'
          path-to-document: '.github/CLA.md'
          branch: main
          allowlist: philippepascal,dependabot[bot]
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, you need to sign our [Contributor License Agreement]($CLA_DOCUMENT).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
